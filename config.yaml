system:
  project_name: "AutoDevCrew"
  version: "1.0.0"

llm:
  provider: "groq" # Options: "local", "gemini"
  api_key: "" # Replace with your actual key
  model_id: "llama-3.3-70b-versatile"  # Or "TinyLlama/TinyLlama-1.1B-Chat-v1.0" for local
  device: "auto"
  max_length: 2048
  temperature: 0.7

memory:
  path: "./data/chromadb"
  collection: "autodevcrew_memory"

embeddings:
  model: "sentence-transformers/all-MiniLM-L6-v2"

server:
  host: "0.0.0.0"
  port: 8000
