Target Language: HTML

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Ordering Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Cakes</a></li>
                <li><a href="#">Order</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Welcome to our Cake Ordering Website</h1>
            <p>Order your favorite cakes online</p>
            <button>Explore Cakes</button>
        </section>
        <section class="featured-cakes">
            <h2>Featured Cakes</h2>
            <div class="cake-grid">
                <div class="cake">
                    <img src="cake1.jpg" alt="Cake 1">
                    <h3>Cake 1</h3>
                    <p>description</p>
                </div>
                <div class="cake">
                    <img src="cake2.jpg" alt="Cake 2">
                    <h3>Cake 2</h3>
                    <p>description</p>
                </div>
                <div class="cake">
                    <img src="cake3.jpg" alt="Cake 3">
                    <h3>Cake 3</h3>
                    <p>description</p>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Cake Ordering Website</p>
    </footer>
</body>
</html>
