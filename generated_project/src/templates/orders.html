{% extends 'base.html' %}

{% block content %}
  <h1>Orders</h1>
  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Cake Name</th>
        <th>Customer Name</th>
        <th>Order Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for order in orders %}
        <tr>
          <td>{{ order.id }}</td>
          <td>{{ order.cake.name }}</td>
          <td>{{ order.customer_name }}</td>
          <td>{{ order.order_date }}</td>
          <td>{{ order.status }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
