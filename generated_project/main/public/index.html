<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        /* Global CSS Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        #container {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 80%;
        }
        
        #header {
            background-color: #007bff;
            color: #fff;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        
        #header h1 {
            margin: 0;
            padding: 0;
        }
        
        #body {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="header">
            <h1>Weather Dashboard</h1>
        </div>
        <div id="body">
            <input type="text" id="location" placeholder="Enter Location">
            <button id="search-btn">Search</button>
            <div id="weather-info">
                <h2 id="city-name"></h2>
                <p id="temperature"></p>
                <p id="condition"></p>
                <p id="description"></p>
            </div>
            <div id="history">
                <h2>Search History</h2>
                <ul id="history-list"></ul>
            </div>
        </div>
    </div>
    
    <script>
        const searchBtn = document.getElementById('search-btn');
        const locationInput = document.getElementById('location');
        const weatherInfo = document.getElementById('weather-info');
        const historyList = document.getElementById('history-list');
        
        searchBtn.addEventListener('click', async () => {
            const location = locationInput.value.trim();
            if (location) {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${location}&appid=YOUR_API_KEY`);
                const data = await response.json();
                
                const city = data.name;
                const temperature = `${Math.round(data.main.temp - 273.15)}°C`;
                const condition = data.weather[0].description;
                const description = data.weather[0].main;
                
                weatherInfo.innerHTML = `
                    <h2 ID="city-name">${city}</h2>
                    <p id="temperature">${temperature}</p>
                    <p id="condition">${condition}</p>
                    <p id="description">${description}</p>
                `;
                
                // Add to search history
                const historyItem = document.createElement('LI');
                historyItem.textContent = location;
                historyList.appendChild(historyItem);
                
                historyInput.value = '';
            }
        });
    </script>
</body>
</html>
