<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        .nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        
        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background-color: #fff;
            margin: 10px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: calc(33.33% - 20px);
        }
        
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        
        .card h2 {
            margin-top: 0;
        }
        
        .card p {
            margin-bottom: 20px;
        }
        
        .card button {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .card button:hover {
            background-color: #444;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Clothe Shopping Dashboard</h1>
    </div>
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
    <div class="content">
        <div class="card">
            <img src="https://picsum.photos/200/300" alt="Product 1">
            <h2>Product 1</h2>
            <p>This is a sample product description.</p>
            <button>Buy Now</button>
        </div>
        <div class="card">
            <img src="https://picsum.photos/200/301" alt="Product 2">
            <h2>Product 2</h2>
            <p>This is a sample product description.</p>
            <button>Buy Now</button>
        </div>
        <div class="card">
            <img src="https://picsum.photos/200/302" alt="Product 3">
            <h2>Product 3</h2>
            <p>This is a sample product description.</p>
            <button>Buy Now</button>
        </div>
    </div>
    <script>
        // Add event listener to buttons
        const buttons = document.querySelectorAll('.card button');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                alert('Button clicked!');
            });
        });
    </script>
</body>
</html>
